<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 300px;
    background: #080A0E;
    font-family: 'JetBrains Mono', monospace;
    color: #E2E8F0;
    --sc: #00D4AA;
  }

  /* --- Header --- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid #0D1117;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #E2E8F0;
  }
  .status-dot { display: flex; align-items: center; gap: 5px; }
  .status-dot .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--sc);
    box-shadow: 0 0 6px var(--sc);
  }
  .status-dot span {
    font-size: 9px; letter-spacing: 1.5px;
    color: var(--sc);
  }
  .status-dot.offline .dot { background: #6B7280; box-shadow: none; }
  .status-dot.offline span { color: #6B7280; }

  /* --- Body --- */
  .body { padding: 0 12px 12px; }

  /* --- BSS --- */
  .bss-section { text-align: center; padding: 16px 0 8px; }
  .bss-score {
    font-size: 52px; font-weight: 700; line-height: 1;
    letter-spacing: -2px; font-family: 'JetBrains Mono', monospace;
  }
  .bss-meta {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 4px;
  }
  .bss-label { font-size: 11px; color: #6B7280; letter-spacing: 3px; }
  .tier-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    padding: 1px 6px; border-radius: 2px;
    border: 1px solid;
  }

  /* --- Cards --- */
  .card {
    background: #0D1117; border-radius: 6px;
    padding: 8px 12px; margin: 4px 0;
  }
  .card-label {
    font-size: 10px; color: #4B5563; letter-spacing: 2px;
  }

  /* --- DSI --- */
  .dsi-row { display: flex; justify-content: space-between; align-items: center; }
  .dsi-right { display: flex; align-items: center; gap: 8px; }
  .dsi-score { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .state-pill {
    font-size: 9px; letter-spacing: 1.5px;
    padding: 2px 6px; border-radius: 3px;
  }

  /* --- Metrics --- */
  .metrics-row { display: flex; gap: 6px; margin: 4px 0; }
  .metric { flex: 1; text-align: center; padding: 8px 10px; }
  .metric-value {
    font-size: 20px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .metric-label {
    font-size: 9px; color: #4B5563; letter-spacing: 1.5px; margin-top: 2px;
  }

  /* --- Onboarding --- */
  .onboarding { padding: 8px 10px; }
  .onboard-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .onboard-header span { font-size: 9px; letter-spacing: 1.5px; }
  .onboard-label { color: #4B5563; }
  .onboard-count { color: #F59E0B; font-family: 'JetBrains Mono', monospace; }
  .progress-track { height: 3px; background: #1F2937; border-radius: 2px; }
  .progress-fill {
    height: 3px; background: #F59E0B; border-radius: 2px;
    transition: width 0.5s;
  }

  /* --- Buttons --- */
  .btn-row { display: flex; gap: 6px; margin-top: 10px; }
  .btn-dashboard {
    flex: 1; padding: 9px 0; border-radius: 6px;
    background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.25);
    color: #00D4AA; font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: background 0.15s;
  }
  .btn-dashboard:hover { background: rgba(0,212,170,0.15); }
  .btn-settings {
    width: 36px; height: 36px; border-radius: 6px;
    background: #0D1117; border: 1px solid #1F2937;
    color: #4B5563; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }
  .btn-settings:hover { border-color: #334155; }

  /* --- Disconnected --- */
  .disconnected { padding: 24px 14px; text-align: center; }
  .disconnected-icon { margin-bottom: 12px; opacity: 0.3; }
  .disconnected-title {
    font-size: 13px; font-weight: 600; color: #E2E8F0; margin-bottom: 4px;
  }
  .disconnected-sub {
    font-size: 10px; color: #4B5563; margin-bottom: 16px; line-height: 1.5;
  }
  .btn-connect {
    display: block; width: 100%; padding: 10px; border-radius: 6px;
    background: #00D4AA; border: 1px solid #00D4AA;
    color: #080A0E; font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: background 0.15s;
  }
  .btn-connect:hover { background: #00BF99; }

  /* --- Loading --- */
  .spinner-wrap {
    display: flex; justify-content: center; align-items: center;
    padding: 40px 0;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid #1E293B; border-top-color: #00D4AA;
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #view-loading, #view-connected, #view-disconnected { display: none; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:var(--sc)">
      <ellipse cx="12" cy="12" rx="10" ry="7" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="3.5" fill="currentColor" opacity="0.9"/>
      <circle cx="13.2" cy="10.8" r="1" fill="#080A0E" opacity="0.6"/>
      <line x1="20.5" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="12" y1="17.5" x2="12" y2="18.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="3.5" y1="12" x2="2" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="12" y1="6.5" x2="12" y2="5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="header-title">DRIFT SENTINEL</span>
  </div>
  <div class="status-dot" id="status-dot">
    <div class="dot"></div>
    <span id="status-label">WATCHING</span>
  </div>
</div>

<!-- Loading -->
<div id="view-loading">
  <div class="spinner-wrap"><div class="spinner"></div></div>
</div>

<!-- Connected -->
<div id="view-connected">
  <div class="body">
    <!-- BSS -->
    <div class="bss-section">
      <div class="bss-score" id="bss-score">--</div>
      <div class="bss-meta">
        <span class="bss-label">BSS</span>
        <span class="tier-badge" id="bss-tier">--</span>
      </div>
    </div>

    <!-- DSI -->
    <div class="card dsi-row">
      <span class="card-label">SESSION DSI</span>
      <div class="dsi-right">
        <span class="dsi-score" id="dsi-score">--</span>
        <span class="state-pill" id="dsi-state">--</span>
      </div>
    </div>

    <!-- Metrics -->
    <div class="metrics-row">
      <div class="card metric">
        <div class="metric-value" id="trades-value" style="color:#E2E8F0">--</div>
        <div class="metric-label">TRADES TODAY</div>
      </div>
      <div class="card metric">
        <div class="metric-value" id="violations-value">--</div>
        <div class="metric-label">VIOLATIONS</div>
      </div>
    </div>

    <!-- Onboarding (conditional) -->
    <div class="card onboarding" id="onboarding-bar" style="display:none">
      <div class="onboard-header">
        <span class="onboard-label">BASELINE BUILDING</span>
        <span class="onboard-count" id="onboard-count">0/70</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="onboard-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn-dashboard" id="btn-dashboard">OPEN DASHBOARD</button>
      <button class="btn-settings" id="btn-settings">&#9881;</button>
    </div>
  </div>
</div>

<!-- Disconnected -->
<div id="view-disconnected">
  <div class="disconnected">
    <div class="disconnected-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
        <ellipse cx="12" cy="12" rx="10" ry="7" stroke="#6B7280" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="3.5" fill="#6B7280" opacity="0.4"/>
        <line x1="4" y1="4" x2="20" y2="20" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="disconnected-title">Not connected</div>
    <div class="disconnected-sub">Connect your account to start monitoring drift</div>
    <button class="btn-connect" id="btn-connect">CONNECT ACCOUNT</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
